<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white h-screen flex items-center justify-center p-6">

    <div class="bg-zinc-900 border-2 border-zinc-800 rounded-3xl p-8 w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-orange-500 uppercase tracking-tighter">Administración</h1>
            <p class="text-zinc-500 font-bold mt-2">Ingrese sus credenciales</p>
        </div>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-xl mb-6 text-center font-bold">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login_admin" class="space-y-6">
            <div>
                <label class="block text-zinc-400 font-bold mb-2">Usuario</label>
                <input type="text" name="usuario" required autocomplete="off"
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors">
            </div>

            <div>
                <label class="block text-zinc-400 font-bold mb-2">Contraseña</label>
                <input type="password" name="password" required 
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors">
            </div>

            <button type="submit" 
                class="w-full bg-orange-600 hover:bg-orange-500 text-white text-xl font-black py-4 rounded-xl active:scale-95 transition-all uppercase mt-4">
                Ingresar
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-zinc-500 hover:text-zinc-300 text-sm font-bold transition-colors">← Volver al inicio</a>
        </div>
    </div>

</body>
</html>
