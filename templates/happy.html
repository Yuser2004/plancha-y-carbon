<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito Happy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-50 min-h-screen pb-24 font-sans">

    <nav class="bg-orange-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter uppercase flex items-center gap-2">
                <i class="fas fa-store"></i> Carrito Happy
            </h1>
            <p id="estado-conexion" class="text-[10px] uppercase tracking-widest font-bold text-orange-200">
                Sincronizando...
            </p>
        </div>
        <button onclick="cargarDespacho()" class="bg-orange-700/50 p-3 rounded-xl active:scale-95 transition">
            <i class="fas fa-sync-alt"></i>
        </button>
    </nav>

    <div class="sticky top-[68px] z-40 bg-white p-4 shadow-sm border-b border-orange-100 flex justify-between items-center px-6">
        <div>
            <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">A entregar a Jefa</p>
            <h2 id="total-a-entregar" class="text-3xl font-black text-slate-800 tracking-tighter">$ 0</h2>
        </div>
        <div class="bg-orange-100 text-orange-600 p-3 rounded-2xl">
            <i class="fas fa-money-bill-wave text-2xl"></i>
        </div>
    </div>

    <main class="p-4 space-y-4" id="contenedor-productos">
        <div class="text-center text-slate-400 mt-10">
            <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
            <p class="font-bold text-sm uppercase">Cargando despacho...</p>
        </div>
    </main>

    <div class="fixed bottom-6 left-6 right-6 z-50">
        <button onclick="generarReporteChica()" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl shadow-2xl shadow-slate-900/50 flex justify-center items-center gap-3 active:scale-95 transition uppercase tracking-widest text-sm">
            <i class="fas fa-file-invoice-dollar text-orange-400"></i>
            Hacer Cuadre Final
        </button>
    </div>

    <script>
        // Los precios son necesarios en esta vista para que la tablet de la chica calcule el total
        const preciosHappy = {
            "Empanada papa carne": 3000, "Empanada papa pollo": 3000, "Papa rellena": 4000,
            "Pastel de yuca": 4000, "Arepa de huevo mixta": 5000, "Torta de carne": 4500,
            "Hawaiana": 3500, "Bocadillo queso": 3000, "Pollo queso": 3500,
            "Ranchera": 3500, "Champipollo": 3800, "Champicarne": 3800, "Chorizo con arepa": 6000,
            "Masato Grande": 3500, "Masato Pequeño": 2000, "Avena Casera": 3500, // Ajusta si tienen otro precio
            "Coca-Cola 350ml": 2800, "Coca-Cola 400ml": 3200, "Tamarindo preparada": 3000,
            "Agua natural": 2000, "Agua con gas": 2500,
            "Coca-Cola 1.5L": 6500, "Quatro 1.5L": 6000
        };

        let despachoActual = {};

        // Cargar lo que mandó la jefa desde Flask
        async function cargarDespacho() {
            try {
                const res = await fetch('/api/despacho_happy');
                despachoActual = await res.json();
                
                const contenedor = document.getElementById('contenedor-productos');
                
                // Si la jefa no ha mandado nada o el objeto está vacío
                if (Object.keys(despachoActual).length === 0) {
                    contenedor.innerHTML = `
                        <div class="bg-white p-8 rounded-3xl shadow-sm text-center border border-slate-100 mt-10">
                            <i class="fas fa-box-open text-4xl text-slate-300 mb-3"></i>
                            <h3 class="font-black text-slate-700 uppercase">Sin inventario</h3>
                            <p class="text-slate-400 text-sm mt-2">La jefa aún no ha enviado el despacho de hoy.</p>
                        </div>
                    `;
                    document.getElementById('estado-conexion').innerText = "ESPERANDO JEFA";
                    return;
                }

                document.getElementById('estado-conexion').innerText = "ACTUALIZADO";
                renderizarInventario(despachoActual);

            } catch (error) {
                console.error("Error cargando despacho:", error);
                document.getElementById('estado-conexion').innerText = "ERROR DE CONEXIÓN";
            }
        }

        // Pintar las tarjetas de los productos
        function renderizarInventario(datos) {
            let html = "";
            for (const [producto, cantidad_recibida] of Object.entries(datos)) {
                if(cantidad_recibida > 0) {
                    const idProd = producto.replace(/\s+/g, '');
                    const precio = preciosHappy[producto] || 0;

                    html += `
                        <div class="bg-white p-4 rounded-3xl border border-orange-100 shadow-sm flex flex-col gap-3">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-black text-slate-800 uppercase text-xs leading-tight mb-1">${producto}</h3>
                                    <span class="text-[10px] text-slate-400 font-bold bg-slate-100 px-2 py-1 rounded-md">$${precio.toLocaleString()} c/u</span>
                                </div>
                                <div class="bg-green-50 px-3 py-1 rounded-xl border border-green-200 text-center">
                                    <span class="block text-[8px] font-black text-green-600 uppercase">Recibido</span>
                                    <span class="block text-lg font-black text-green-700">${cantidad_recibida}</span>
                                </div>
                            </div>

                            <div class="bg-orange-50/50 p-3 rounded-2xl flex items-center justify-between border border-orange-100">
                                <span class="text-xs font-black text-orange-600 uppercase">¿Cuánto sobró?</span>
                                <input type="number" min="0" max="${cantidad_recibida}" placeholder="0" id="sobro-${idProd}" 
                                    oninput="calcularTodo()" 
                                    class="w-20 bg-white border-2 border-orange-200 rounded-xl py-2 text-center font-black text-orange-600 text-xl shadow-inner focus:border-orange-500 focus:outline-none">
                            </div>
                            
                            <div class="flex justify-between items-center px-1">
                                <span class="text-[10px] font-bold text-slate-400" id="texto-vendidos-${idProd}">Vendidos: 0</span>
                                <span class="text-[11px] font-black text-slate-700" id="texto-dinero-${idProd}">$ 0</span>
                            </div>
                        </div>
                    `;
                }
            }
            document.getElementById('contenedor-productos').innerHTML = html;
            calcularTodo(); // Para inicializar en ceros
        }

        // Se ejecuta cada vez que la chica escribe un número en "Sobrantes"
        function calcularTodo() {
            let granTotal = 0;

            for (const [producto, cantidad_recibida] of Object.entries(despachoActual)) {
                const idProd = producto.replace(/\s+/g, '');
                const inputSobro = document.getElementById(`sobro-${idProd}`);
                
                if (inputSobro) {
                    // Validar que no ponga más de lo que recibió
                    let sobro = parseInt(inputSobro.value) || 0;
                    if (sobro > cantidad_recibida) {
                        sobro = cantidad_recibida;
                        inputSobro.value = sobro;
                    }

                    const vendidos = Math.max(0, cantidad_recibida - sobro);
                    const precio = preciosHappy[producto] || 0;
                    const dineroGenerado = vendidos * precio;

                    // Actualizar textos pequeños de la tarjeta
                    document.getElementById(`texto-vendidos-${idProd}`).innerText = `Vendidos: ${vendidos}`;
                    document.getElementById(`texto-dinero-${idProd}`).innerText = `$ ${dineroGenerado.toLocaleString()}`;

                    granTotal += dineroGenerado;
                }
            }

            // Actualizar total grande de arriba
            document.getElementById('total-a-entregar').innerText = `$ ${granTotal.toLocaleString()}`;
        }

        // Genera el resumen para mandárselo a la jefa
        function generarReporteChica() {
            let resumen = "*💵 CIERRE DE TURNO HAPPY*\n\n";
            let totalDinero = 0;
            let hayVentas = false;

            for (const [producto, cantidad_recibida] of Object.entries(despachoActual)) {
                const idProd = producto.replace(/\s+/g, '');
                const sobro = parseInt(document.getElementById(`sobro-${idProd}`)?.value) || 0;
                
                const vendidos = Math.max(0, cantidad_recibida - sobro);
                
                if (vendidos > 0) {
                    const precio = preciosHappy[producto] || 0;
                    const dinero = vendidos * precio;
                    resumen += `▪️ *${producto}*\n`;
                    resumen += `   Recibió: ${cantidad_recibida} | Sobró: ${sobro} | Vendió: ${vendidos}\n`;
                    resumen += `   Total: $${dinero.toLocaleString()}\n\n`;
                    totalDinero += dinero;
                    hayVentas = true;
                }
            }

            resumen += `*💰 DEBES ENTREGAR: $${totalDinero.toLocaleString()}*`;

            if(!hayVentas) {
                alert("No has registrado ninguna venta todavía. Asegúrate de poner lo que sobró.");
                return;
            }

            // Muestra en pantalla y abre WhatsApp
            if(confirm("¿Estás segura de finalizar el cuadre?\nTotal a entregar: $" + totalDinero.toLocaleString())) {
                // Aquí puedes poner el número de WhatsApp de la Jefa
                const numeroJefa = "573000000000"; // Reemplaza con el número real
                const url = `https://wa.me/${numeroJefa}?text=${encodeURIComponent(resumen)}`;
                window.open(url, '_blank');
            }
        }

        // Cargar al iniciar
        window.onload = cargarDespacho;
    </script>
</body>
</html>
