<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Plancha y Carbón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .order-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Efecto de pulso para cuando hay algo nuevo */
        .nuevo-pedido { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { border-color: #ea580c; }
            50% { border-color: #f97316; }
            100% { border-color: #ea580c; }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-zinc-950 text-white p-6">
    
    <header class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
        <div>
            <h1 class="text-4xl font-black text-orange-500 uppercase tracking-tighter">Panel de Cocina</h1>
            <p class="text-zinc-500 font-bold">Órdenes de Plancha y Carbón</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="activarVoz()" id="btnVoz" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm">
                🔊 Activar Sonido
            </button>
            <div id="reloj" class="text-3xl font-mono font-bold text-zinc-400">00:00:00</div>
        </div>
    </header>

    <div id="tablero-cocina" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </div>

    <audio id="notificacion" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const socket = io();
    let vozActivada = false;
    let pedidosProcesados = new Set(); 

    function hablarPedido(texto) {
        if (!vozActivada) return;
        const mensaje = new SpeechSynthesisUtterance(texto);
        mensaje.lang = 'es-ES';
        mensaje.rate = 0.9;
        window.speechSynthesis.speak(mensaje);
    }

    function activarVoz() {
        vozActivada = true;
        document.getElementById('btnVoz').classList.add('bg-green-600');
        document.getElementById('btnVoz').innerText = "🔊 Asistente Activada";
        reproducirSonido();
        hablarPedido("Asistente de cocina activada.");
    }

    function reproducirSonido() {
        const audio = document.getElementById('notificacion');
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Clic en Activar Voz primero"));
    }

    socket.on('actualizar_mesas', () => {
        actualizarCocina();
    });

// Variable global para evitar recargas innecesarias
let ultimaDataStr = ""; 

async function actualizarCocina() {
    try {
        // No bloqueamos la UI, pedimos la data en segundo plano
        const res = await fetch('/estado_mesas');
        const mesas = await res.json();
        
        // Comparamos si la data es igual a la anterior para no refrescar por gusto
        const dataActualStr = JSON.stringify(mesas);
        if (dataActualStr === ultimaDataStr) return; 
        ultimaDataStr = dataActualStr;

        const tablero = document.getElementById('tablero-cocina');
        let html = "";

        for (let numMesa in mesas) {
            const mesa = mesas[numMesa];
            if (!mesa.items || mesa.items.length === 0) continue; 

            const itemsNuevos = mesa.items.filter(i => !i.despachado);
            // Si la mesa ya no tiene nada nuevo, no la mostramos en cocina
            if (itemsNuevos.length === 0) continue; 

            const nombreMesero = mesa.mesero || "Mesero";

            // Lógica de Voz (Se mantiene igual, funciona bien)
            itemsNuevos.forEach(item => {
                const pedidoID = `${numMesa}-${item.nombre}-${item.cantidad}`;
                if (!pedidosProcesados.has(pedidoID)) {
                    reproducirSonido();
                    const textoRepetido = `Mesa ${numMesa}, atendida por ${nombreMesero}. ${item.cantidad} ${item.nombre}. Repito. ${item.cantidad} ${item.nombre}.`;
                    hablarPedido(textoRepetido);
                    pedidosProcesados.add(pedidoID);
                }
            });

            let itemsHtml = "";
            itemsNuevos.forEach(item => {
                itemsHtml += `
                    <li class="flex flex-col py-3 border-b border-zinc-700 bg-orange-500/5 -mx-2 px-2">
                        <div class="flex items-center">
                            <span class="text-5xl font-black text-orange-500 mr-4">${item.cantidad}</span>
                            <span class="text-2xl font-black uppercase text-white">${item.nombre}</span>
                        </div>
                        ${item.nota ? `<span class="text-yellow-300 text-lg italic mt-1 font-medium">⚠️ ${item.nota}</span>` : ''}
                    </li>`;
            });

            html += `
                <div class="order-card bg-zinc-900 border-2 nuevo-pedido border-orange-600 rounded-3xl p-6 flex flex-col h-full shadow-xl shadow-orange-900/10">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-orange-600 text-white text-3xl font-black px-6 py-2 rounded-2xl">Mesa ${numMesa}</span>
                        <span class="text-zinc-500 text-xs font-bold uppercase">${nombreMesero}</span>
                    </div>
                    <ul class="flex-1">${itemsHtml}</ul>
                    <button onclick="despacharMesa('${numMesa}', this)" class="mt-6 w-full bg-green-600 text-white text-2xl font-black py-5 rounded-2xl active:scale-95 transition-all uppercase shadow-lg">
                        ¡Listo!
                    </button>
                </div>`;
        }
        tablero.innerHTML = html || `<p class='col-span-full text-center text-zinc-600 mt-20 italic text-2xl'>No hay pedidos pendientes.</p>`;
    } catch (e) { 
        console.error("Error actualizando cocina:", e); 
    }
}

    async function despacharMesa(num, btn) {
        // 1. OBTENER LA TARJETA (CARD) COMPLETA
        const card = btn.closest('.order-card');
        
        // 2. EFECTO VISUAL INSTANTÁNEO
        // En lugar de "Procesando", hacemos que la tarjeta se desvanezca de inmediato
        card.style.transition = "all 0.3s ease";
        card.style.opacity = "0.5";
        card.style.transform = "scale(0.95)";
        btn.disabled = true;
        btn.innerHTML = "ENVIANDO...";

        try {
            // 3. ENVIAR AL SERVIDOR (Sin bloquear la interfaz)
            const res = await fetch(`/completar_mesa/${num}`, { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (res.ok) {
                // Si salió bien, eliminamos la tarjeta con una animación suave
                card.style.transform = "translateX(100px)";
                card.style.opacity = "0";
                setTimeout(() => {
                    actualizarCocina(); // Refresca el tablero de fondo
                }, 300);
            } else {
                throw new Error("Error en servidor");
            }
        } catch (e) {
            // 4. SI FALLA, REVERTIR (Por si no hay internet)
            alert("¡Error al despachar! Intenta de nuevo.");
            card.style.opacity = "1";
            card.style.transform = "scale(1)";
            btn.disabled = false;
            btn.innerHTML = "¡Listo!";
            btn.classList.replace('bg-zinc-700', 'bg-green-600');
        }
    }

    setInterval(() => {
        document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
    }, 1000);

    window.onload = actualizarCocina;
</script>
</body>
</html>
